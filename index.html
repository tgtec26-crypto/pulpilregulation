<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>동공 크기와 빛의 양 시뮬레이션</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f8f8f6;display:flex;justify-content:center;align-items:center;min-height:100vh;}
#app{display:flex;width:100%;max-width:1100px;gap:0;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);user-select:none;}
.left{flex:1.5;min-width:0;display:flex;flex-direction:column;}
.right{flex:1;min-width:0;display:flex;flex-direction:column;border-left:1px solid #e8e8e4;}
canvas{width:100%;display:block;}
.controls{padding:12px 16px;display:flex;flex-direction:column;gap:12px;}
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-row label{font-size:14px;color:#666;min-width:80px;font-weight:500;}
.slider-row input[type=range]{flex:1;height:6px;-webkit-appearance:none;appearance:none;background:#e0e0dc;border-radius:3px;outline:none;}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#F0A030;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.slider-row span{font-size:14px;font-weight:600;min-width:36px;text-align:right;color:#333;}
.light-row{display:flex;align-items:center;gap:10px;}
.light-row label{font-size:14px;color:#666;min-width:80px;font-weight:500;}
.light-btns{display:flex;gap:6px;flex:1;}
.light-btns button{flex:1;font-size:13px;padding:7px 4px;border-radius:8px;border:1.5px solid #ccc;background:#fff;cursor:pointer;font-weight:600;color:#555;transition:all 0.2s;}
.light-btns button:hover{background:#f0f0ec;border-color:#aaa;}
.light-btns button.active{background:#F0A030;color:#fff;border-color:#D08020;}
#exposureMsg{font-size:14px;text-align:center;min-height:22px;font-weight:600;padding:6px 0;}
#sceneLabel{text-align:center;font-size:13px;padding:6px;font-weight:600;}
@media(max-width:600px){#app{flex-direction:column;}.right{border-left:none;border-top:1px solid #e8e8e4;}}
</style>
</head>
<body>
<div id="app">
<div class="left">
<canvas id="eyeCanvas"></canvas>
<div class="controls">
<div class="slider-row">
<label>동공 크기</label>
<input type="range" id="sliderPupil" min="0.18" max="0.70" value="0.40" step="0.01">
<span id="valPupil"></span>
</div>
<div class="light-row">
<label>조명 밝기</label>
<div class="light-btns">
<button data-light="0.2">20</button>
<button data-light="0.4">40</button>
<button data-light="0.6" class="active">60</button>
<button data-light="0.8">80</button>
<button data-light="1.0">100</button>
</div>
</div>
<div id="exposureMsg"></div>
</div>
</div>
<div class="right">
<canvas id="sceneCanvas"></canvas>
<div id="sceneLabel"></div>
</div>
</div>
<script>
const eyeC=document.getElementById('eyeCanvas'),sceneC=document.getElementById('sceneCanvas');
const ctx=eyeC.getContext('2d'),sctx=sceneC.getContext('2d');
const sliderPupil=document.getElementById('sliderPupil');
const valPupil=document.getElementById('valPupil');
const exposureMsg=document.getElementById('exposureMsg'),sceneLabel=document.getElementById('sceneLabel');
const lightBtns=document.querySelectorAll('.light-btns button');
let dpr=window.devicePixelRatio||1,W,H,SW,SH;
let lightLevel=0.6;
const OPTIMAL=0.18;

// 1. 왼쪽 홍채 단면도 이미지
const svgImg=new Image();
svgImg.src='eye.svg'; 
let svgLoaded=false;
svgImg.onload=()=>{svgLoaded=true;drawAll();};

// ✨ 2. 오른쪽 배경 이미지 로드 (여기에 원하는 파일명을 넣으세요)
const sceneImg = new Image();
sceneImg.src = 'scene.jpg'; // 예: 'room.png', 'landscape.svg' 등
let sceneLoaded = false;
sceneImg.onload = () => { sceneLoaded = true; drawAll(); };

lightBtns.forEach(btn=>{
  btn.onclick=()=>{
    lightBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    lightLevel=parseFloat(btn.dataset.light);
    drawAll();
  };
});

function resize(){
  const ew=eyeC.parentElement.clientWidth,eh=Math.round(ew*0.7);
  eyeC.width=ew*dpr;eyeC.height=eh*dpr;eyeC.style.height=eh+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);W=ew;H=eh;
  const sw=sceneC.parentElement.clientWidth;
  sceneC.width=sw*dpr;sceneC.height=eh*dpr;sceneC.style.height=eh+'px';
  sctx.setTransform(dpr,0,0,dpr,0,0);SW=sw;SH=eh;
  drawAll();
}

function getExposure(){return parseFloat(sliderPupil.value)*lightLevel;}

function drawAll(){
  const pupil=parseFloat(sliderPupil.value),exposure=getExposure();
  valPupil.textContent=Math.round(pupil*100)+'%';
  drawEye(pupil,exposure);
  drawScene(exposure);
  const diff=Math.abs(exposure-OPTIMAL);
  if(diff<0.04){exposureMsg.textContent='적정 노출 - 선명하게 보입니다';exposureMsg.style.color='#1D9E75';}
  else if(exposure<OPTIMAL){exposureMsg.textContent='노출 부족 - 어둡게 보입니다';exposureMsg.style.color='#6B6B6B';}
  else{exposureMsg.textContent='노출 과다 - 눈부시게 보입니다';exposureMsg.style.color='#E24B4A';}
}

function drawEye(pupilSize,exposure){
  ctx.clearRect(0,0,W,H);
  const cx=W*0.22,cy=H*0.44;
  const outerR=Math.min(W,H)*0.28;
  const irisR=outerR*0.72;
  const pupilR=irisR*pupilSize;

  // 정면 눈 렌더링
  ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);
  ctx.fillStyle='#F5F0E8';ctx.fill();ctx.strokeStyle='#C0B8A8';ctx.lineWidth=2;ctx.stroke();
  const iG=ctx.createRadialGradient(cx-irisR*0.12,cy-irisR*0.12,irisR*0.1,cx,cy,irisR);
  iG.addColorStop(0,'#8B6914');iG.addColorStop(0.35,'#6B4A10');iG.addColorStop(0.7,'#5A3A0A');iG.addColorStop(1,'#3A2505');
  ctx.beginPath();ctx.arc(cx,cy,irisR,0,Math.PI*2);ctx.fillStyle=iG;ctx.fill();
  
  ctx.save();ctx.globalAlpha=0.25;
  for(let i=0;i<48;i++){
    const ang=i*Math.PI*2/48;
    ctx.beginPath();ctx.moveTo(cx+Math.cos(ang)*pupilR*1.15,cy+Math.sin(ang)*pupilR*1.15);
    ctx.lineTo(cx+Math.cos(ang)*irisR*0.95,cy+Math.sin(ang)*irisR*0.95);
    ctx.strokeStyle='#2A1800';ctx.lineWidth=1.2;ctx.stroke();
  }
  ctx.restore();
  
  const pG=ctx.createRadialGradient(cx,cy,0,cx,cy,pupilR);
  pG.addColorStop(0,'#000');pG.addColorStop(0.85,'#0a0a0a');pG.addColorStop(1,'#1a1a1a');
  ctx.beginPath();ctx.arc(cx,cy,pupilR,0,Math.PI*2);ctx.fillStyle=pG;ctx.fill();
  ctx.beginPath();ctx.arc(cx-pupilR*0.25,cy-pupilR*0.25,pupilR*0.18,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,irisR,0,Math.PI*2);ctx.strokeStyle='#2A1800';ctx.lineWidth=2.5;ctx.stroke();

  const diff=Math.abs(exposure-OPTIMAL);
  if(diff>=0.04){
    const over=exposure>OPTIMAL;
    const col=over?'#2266DD':'#DD3333';
    const arrDist=pupilR*1.6;
    const arrLen=pupilR*0.5;
    [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
      const fR=over?arrDist:arrDist-arrLen;
      const tR=over?arrDist-arrLen:arrDist;
      const fx=cx+dx*fR,fy=cy+dy*fR,tx=cx+dx*tR,ty=cy+dy*tR;
      ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);
      ctx.strokeStyle=col;ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();
      const adx=tx-fx,ady=ty-fy,al=Math.sqrt(adx*adx+ady*ady);
      const ux=adx/al,uy=ady/al,sz=8;
      ctx.beginPath();ctx.moveTo(tx-ux*sz-uy*sz*0.6,ty-uy*sz+ux*sz*0.6);ctx.lineTo(tx,ty);ctx.lineTo(tx-ux*sz+uy*sz*0.6,ty-uy*sz-ux*sz*0.6);
      ctx.strokeStyle=col;ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    });
  }

  // 단면도(SVG) 및 동적 홍채 렌더링
  if(svgLoaded){
    const srcX=540,srcY=240,srcW=260,srcH=230;
    const svgTargetH=outerR*2.2;
    const svgAspect=srcW/srcH;
    const svgDispW=svgTargetH*svgAspect;
    const svgDispH=svgTargetH;
    const svgX=W*0.44;
    const svgY=cy-svgDispH*0.5;

    ctx.drawImage(svgImg,srcX,srcY,srcW,srcH,svgX,svgY,svgDispW,svgDispH);

    const mapX=(sx)=>(sx-srcX)/srcW*svgDispW+svgX;
    const mapY=(sy)=>(sy-srcY)/srcH*svgDispH+svgY;

    const irisCenterY = mapY(363); 
    const irisX = mapX(594); 
    
    const irisTopAnchor = mapY(310);     
    const irisBottomAnchor = mapY(416);  

    const irisFullHalf = (mapY(415)-mapY(300)) / 2;
    const openHalf = irisFullHalf * pupilSize; 

    const irisW = 6; 
    ctx.fillStyle = '#6D4026'; 

    const topH = (irisCenterY - openHalf) - irisTopAnchor;
    if (topH > 0) {
        ctx.beginPath();
        ctx.roundRect(irisX - irisW/2, irisTopAnchor, irisW, topH, 3);
        ctx.fill();
        ctx.strokeStyle = '#332222'; ctx.lineWidth = 1; ctx.stroke();
    }

    const botH = irisBottomAnchor - (irisCenterY + openHalf);
    if (botH > 0) {
        ctx.beginPath();
        ctx.roundRect(irisX - irisW/2, irisCenterY + openHalf, irisW, botH, 3);
        ctx.fill();
        ctx.strokeStyle = '#332222'; ctx.lineWidth = 1; ctx.stroke();
    }
  }
}

// ✨ 수정된 배경 그리기 함수
function drawScene(exposure){
  sctx.clearRect(0,0,SW,SH);
  let brightness;
  if(exposure<OPTIMAL){brightness=Math.max(0.03,exposure/OPTIMAL);}else{brightness=1;}
  const whiteOv = exposure > OPTIMAL ? Math.min(0.98, (exposure - OPTIMAL) * 4.5) : 0;
  
  // 1. 이미지 렌더링 (CSS의 object-fit: cover 와 동일하게 비율을 유지하며 꽉 채우도록 설정)
  if(sceneLoaded){
    const imgRatio = sceneImg.width / sceneImg.height;
    const canvasRatio = SW / SH;
    let drawW = SW, drawH = SH, drawX = 0, drawY = 0;
    
    if(imgRatio > canvasRatio) {
        drawW = SH * imgRatio;
        drawX = (SW - drawW) / 2;
    } else {
        drawH = SW / imgRatio;
        drawY = (SH - drawH) / 2;
    }
    sctx.drawImage(sceneImg, drawX, drawY, drawW, drawH);
  } else {
    // 이미지가 아직 로드되지 않았을 때의 임시 배경색
    sctx.fillStyle = '#E0D8C4';
    sctx.fillRect(0, 0, SW, SH);
  }

  // 2. 노출 과다 효과 (하얗게 날아감 + 빛 번짐)
  if(whiteOv>0){
    sctx.fillStyle='rgba(255,255,255,'+whiteOv+')';
    sctx.fillRect(0,0,SW,SH);
    
    sctx.globalCompositeOperation = 'screen';
    sctx.fillStyle='rgba(255,255,255,'+(whiteOv * 0.5)+')';
    sctx.fillRect(0,0,SW,SH);
    sctx.globalCompositeOperation = 'source-over'; 
  }

  // 3. 노출 부족 효과 (어둡게 만듦)
  if(exposure<OPTIMAL){
    const d=1-brightness;
    sctx.fillStyle='rgba(0,0,0,'+d+')';
    sctx.fillRect(0,0,SW,SH);
  }

  // 4. 하단 노출 % 라벨 업데이트
  const expP=Math.round(exposure/OPTIMAL*100);
  sceneLabel.textContent='노출: '+expP+'%';
  sceneLabel.style.color=Math.abs(exposure-OPTIMAL)<0.04?'#1D9E75':exposure<OPTIMAL?'#6B6B6B':'#E24B4A';
}

sliderPupil.oninput=drawAll;
window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
